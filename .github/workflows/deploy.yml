name: Deploy PC-OFF

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOMAIN: pcoff.sanghak.kr
  PUBLIC_BASE_URL: https://pcoff.sanghak.kr
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pc-off-system

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_configured: ${{ steps.deploy-secrets.outputs.configured }}
    steps:
      - name: Check deployment secrets
        id: deploy-secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript
        run: |
          node -c src/server.js
          node -c src/firebase.js
          node -c src/r2.js
          node -c src/cloudflareDns.js
          node --check public/app.js
          node --check public/nav.js
          node --check public/report.js

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build
    if: ${{ needs.preflight.outputs.deploy_configured == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/pcoff' }}"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '$DEPLOY_DIR'"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT || '22' }}" docker-compose.deploy.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DEPLOY_DIR/docker-compose.yml"

      - name: Deploy on server
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/pcoff' }}"
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -euo pipefail
          cd "$DEPLOY_DIR"
          if [ -n "${{ secrets.DEPLOY_ENV_B64 }}" ]; then
            printf '%s' "${{ secrets.DEPLOY_ENV_B64 }}" | base64 -d > .env
          elif [ ! -f .env ]; then
            cat > .env <<ENVEOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          PGSSLMODE=${{ secrets.PGSSLMODE || 'disable' }}
          AGENT_TOKEN=${{ secrets.AGENT_TOKEN }}
          PMON_PUBLIC_BASE_URL=${{ env.PUBLIC_BASE_URL }}
          PMON_AUTH_REQUIRED=${{ secrets.PMON_AUTH_REQUIRED || 'false' }}
          PMON_ALLOWED_EMAILS=${{ secrets.PMON_ALLOWED_EMAILS }}
          PMON_ALLOWED_DOMAINS=${{ secrets.PMON_ALLOWED_DOMAINS }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          R2_PREFIX=${{ secrets.R2_PREFIX || 'pc-off' }}
          ENVEOF
          fi
          docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          PCOFF_IMAGE="${{ needs.build.outputs.image }}" docker compose pull
          PCOFF_IMAGE="${{ needs.build.outputs.image }}" docker compose up -d
          docker image prune -f
          EOF

      - name: Verify deployment
        run: curl -fsS "${{ env.PUBLIC_BASE_URL }}/api/health"

  deployment-not-configured:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build
    if: ${{ needs.preflight.outputs.deploy_configured != 'true' }}
    steps:
      - name: Explain skipped deploy
        run: |
          echo "Docker image was built and pushed to GHCR."
          echo "Server deploy was skipped because DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY is not configured."
