services:
  pcoff:
    image: ${PCOFF_IMAGE:?PCOFF_IMAGE is required}
    container_name: pcoff
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4500
      PMON_PUBLIC_BASE_URL: https://pcoff.sanghak.kr
    ports:
      - "${PCOFF_BIND:-127.0.0.1:4500}:4500"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4500/api/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
